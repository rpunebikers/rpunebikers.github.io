<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — PuneBikers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" type="image/jpeg" href="assets/images/logo-bike.jpg" />
  <script>if(localStorage.getItem("pb-theme")==="light")document.documentElement.dataset.theme="light";</script>
  <style>
    .admin-page { max-width: 920px; margin: 0 auto; padding: calc(var(--nav-height) + 2.5rem) 1.5rem 5rem; }

    /* ─── Login screen ─── */
    #login-screen { max-width: 400px; margin: 0 auto; }
    #login-screen h1 { font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 0.25rem; }
    .login-err { color: #e55; font-size: 0.83rem; margin-top: 0.5rem; min-height: 1.2em; }

    /* ─── Admin UI ─── */
    #admin-ui { display: none; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .admin-header h1 { font-family: var(--font-display); font-size: 2.2rem; margin: 0; }

    /* ─── Tabs ─── */
    .admin-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--clr-border); margin-bottom: 2rem; }
    .admin-tab { padding: 0.75rem 1.5rem; background: none; border: none; border-bottom: 2.5px solid transparent; color: var(--clr-text-muted); font-weight: 600; font-size: 0.875rem; cursor: pointer; letter-spacing: 0.04em; transition: color 0.2s, border-color 0.2s; }
    .admin-tab.active { color: var(--clr-primary); border-bottom-color: var(--clr-primary); }
    .admin-pane { display: none; }
    .admin-pane.active { display: block; }

    /* ─── Card ─── */
    .admin-card { background: var(--clr-glass-bg); border: 1px solid var(--clr-glass-border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
    .admin-card h2 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--clr-primary); margin-bottom: 1.25rem; }

    /* ─── Form ─── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 600px) { .form-row, .form-row.triple { grid-template-columns: 1fr; } }
    .fgroup label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--clr-text-muted); margin-bottom: 0.35rem; }
    .fgroup input, .fgroup select, .fgroup textarea {
      width: 100%; padding: 0.65rem 0.85rem; box-sizing: border-box;
      border-radius: var(--radius-sm); border: 1px solid var(--clr-glass-border);
      background: var(--clr-surface); color: var(--clr-text);
      font-family: var(--font-body); font-size: 0.875rem;
    }
    .fgroup input:focus, .fgroup select:focus { outline: none; border-color: var(--clr-primary); }
    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.25rem; align-items: center; }

    /* ─── Ride list ─── */
    .ride-list { display: flex; flex-direction: column; gap: 0.65rem; }
    .ride-row {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.85rem 1rem; border-radius: var(--radius-md);
      background: var(--clr-surface); border: 1px solid var(--clr-border);
    }
    .ride-row-emoji { font-size: 1.5rem; flex-shrink: 0; }
    .ride-row-info { flex: 1; min-width: 0; }
    .ride-row-info strong { display: block; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ride-row-info span { font-size: 0.75rem; color: var(--clr-text-muted); }
    .ride-row-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .icon-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--clr-glass-border); background: var(--clr-glass-bg); color: var(--clr-text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; transition: var(--transition); }
    .icon-btn:hover { border-color: var(--clr-primary); color: var(--clr-primary); }
    .icon-btn.del:hover { border-color: #e55; color: #e55; }
    .status-pill { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 99px; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .sp-open      { background: rgba(240,165,0,0.15); color: var(--clr-accent); }
    .sp-scheduled { background: rgba(240,165,0,0.15); color: var(--clr-accent); }
    .sp-active    { background: rgba(34,197,94,0.15); color: #22c55e; }
    .sp-cancelled { background: rgba(100,100,100,0.12); color: #666; }
    .sp-completed { background: rgba(100,100,100,0.12); color: #888; }

    /* ─── Registrations table ─── */
    .reg-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .reg-table th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--clr-text-muted); border-bottom: 1px solid var(--clr-border); }
    .reg-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--clr-border); vertical-align: top; }
    .reg-table tr:last-child td { border-bottom: none; }
    .reg-table tr:hover td { background: var(--clr-glass-bg); }
    .reg-meta { font-size: 0.72rem; color: var(--clr-text-muted); margin-top: 0.2rem; }
    .reg-empty { text-align: center; padding: 2.5rem; color: var(--clr-text-muted); }
    .reg-filter { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .reg-filter select, .reg-filter input { padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); border: 1px solid var(--clr-glass-border); background: var(--clr-surface); color: var(--clr-text); font-size: 0.82rem; font-family: var(--font-body); }
    .reg-count { font-size: 0.8rem; color: var(--clr-text-muted); margin-left: auto; }

    /* ─── Misc ─── */
    .save-notice { font-size: 0.8rem; color: #4caf50; opacity: 0; transition: opacity 0.3s; }
    .save-notice.show { opacity: 1; }
    .admin-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(232,82,10,0.3); border-top-color: var(--clr-primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .no-rides { color: var(--clr-text-muted); font-size: 0.875rem; padding: 0.5rem 0; }
    .setup-banner { background: rgba(232,82,10,0.1); border: 1px solid rgba(232,82,10,0.3); border-radius: var(--radius-md); padding: 1rem 1.25rem; font-size: 0.85rem; line-height: 1.7; margin-bottom: 1.5rem; }
    .setup-banner code { background: var(--clr-surface-2); padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.8rem; }
  </style>
</head>
<body>

  <nav class="navbar" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo" aria-label="PuneBikers home">
        <img src="assets/images/logo-bike.jpg" class="nav-logo-bike" alt="" aria-hidden="true">
        <img src="assets/images/logo-text.png" class="nav-logo-text" alt="r/PuneBikers">
      </a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour theme">🌙</button>
    </div>
  </nav>

  <main id="main">
  <div class="admin-page">

    <!-- ══ LOGIN SCREEN ══ -->
    <div id="login-screen">
      <h1>Admin Login</h1>
      <p style="color:var(--clr-text-muted);font-size:0.875rem;margin-bottom:1.5rem;">PuneBikers ride management</p>
      <div id="config-warn" class="setup-banner" style="display:none;">
        Firebase not configured yet. Fill in <code>assets/js/firebase-config.js</code> with your project values, then reload.
      </div>
      <div class="admin-card" id="login-form-wrap">
        <div class="fgroup" style="margin-bottom:1rem;">
          <label for="l-email">Email</label>
          <input id="l-email" type="email" autocomplete="email" placeholder="admin@example.com" />
        </div>
        <div class="fgroup" style="margin-bottom:1rem;">
          <label for="l-pass">Password</label>
          <input id="l-pass" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()">Sign In</button>
        <p class="login-err" id="login-err"></p>
      </div>
    </div>

    <!-- ══ ADMIN UI (shown after login) ══ -->
    <div id="admin-ui">

      <div class="admin-header">
        <h1>Ride Admin</h1>
        <div style="display:flex;align-items:center;gap:1rem;">
          <span id="admin-email" style="font-size:0.8rem;color:var(--clr-text-muted);"></span>
          <button class="btn btn-outline btn-sm" onclick="doLogout()">Sign Out</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs" role="tablist">
        <button class="admin-tab active" data-pane="rides" role="tab">Upcoming Rides</button>
        <button class="admin-tab" data-pane="registrations" role="tab">Registrations</button>
      </div>

      <!-- ── RIDES PANE ── -->
      <div id="pane-rides" class="admin-pane active">

        <!-- Ride list -->
        <div class="admin-card">
          <h2>Live Rides <span id="rides-spinner" class="admin-spinner" style="display:none;"></span></h2>
          <div id="ride-list" class="ride-list"><p class="no-rides">Loading…</p></div>
        </div>

        <!-- Add / Edit form -->
        <div class="admin-card">
          <h2 id="form-heading">Add New Ride</h2>
          <input type="hidden" id="edit-key" />

          <div class="form-row">
            <div class="fgroup"><label>Ride Name *</label><input id="f-title" placeholder="Monsoon Ghats Escape" /></div>
            <div class="fgroup"><label>Meeting Point *</label><input id="f-location" placeholder="Shivajinagar, Pune" /></div>
          </div>
          <div class="form-row">
            <div class="fgroup"><label>Destination *</label><input id="f-destination" placeholder="Tamhini Ghats" /></div>
            <div class="fgroup"><label>Distance (km)</label><input id="f-distance" type="number" placeholder="180" /></div>
          </div>
          <div class="form-row triple">
            <div class="fgroup"><label>Date &amp; Time *</label><input id="f-date" placeholder="Mon 12 Jul, 9:00 AM" /></div>
            <div class="fgroup"><label>Max Riders</label><input id="f-spots" type="number" placeholder="20" /></div>
            <div class="fgroup"><label>Emoji</label><input id="f-emoji" maxlength="4" placeholder="🌿" /></div>
          </div>
          <div class="form-row">
            <div class="fgroup">
              <label>Type</label>
              <select id="f-type">
                <option value="ghats">Ghats</option>
                <option value="coastal">Coastal</option>
                <option value="touring">Touring</option>
                <option value="weekend">Weekend</option>
                <option value="overnight">Overnight</option>
                <option value="general">General</option>
              </select>
            </div>
            <div class="fgroup">
              <label>Status</label>
              <select id="f-status">
                <option value="scheduled">Scheduled</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
          </div>
          <div class="fgroup"><label>Notes (optional)</label><input id="f-notes" placeholder="Helmets and rain gear mandatory" /></div>

          <div class="btn-row">
            <button class="btn btn-primary" id="save-btn" onclick="saveRide()">Add Ride</button>
            <button class="btn btn-outline" id="cancel-btn" onclick="cancelEdit()" style="display:none;">Cancel</button>
            <span class="save-notice" id="save-notice">Saved!</span>
          </div>
        </div>
      </div>

      <!-- ── REGISTRATIONS PANE ── -->
      <div id="pane-registrations" class="admin-pane">
        <div class="admin-card">
          <h2>Registrations <span id="reg-spinner" class="admin-spinner" style="display:none;"></span></h2>

          <div class="reg-filter">
            <select id="reg-filter-ride" onchange="filterRegs()">
              <option value="">All rides</option>
            </select>
            <input id="reg-search" type="search" placeholder="Search name / email…" oninput="filterRegs()" style="min-width:180px;" />
            <span class="reg-count" id="reg-count"></span>
          </div>

          <div style="overflow-x:auto;">
            <table class="reg-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Ride</th>
                  <th>Phone</th>
                  <th>Bike</th>
                  <th>Instagram</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="reg-tbody"><tr><td colspan="6" class="reg-empty">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /admin-ui -->
  </div>
  </main>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
  (() => {
    const cfg = window.PB_FIREBASE;
    const isConfigured = cfg && cfg.databaseURL && !cfg.databaseURL.includes('YOUR-PROJECT');

    // Show warning if not configured
    if (!isConfigured) {
      document.getElementById('config-warn').style.display = '';
      document.getElementById('login-form-wrap').style.opacity = '0.4';
      document.getElementById('login-form-wrap').style.pointerEvents = 'none';
    }

    // Init Firebase
    let db, auth;
    if (isConfigured) {
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      db   = firebase.database();
      auth = firebase.auth();

      auth.onAuthStateChanged(user => {
        if (user) showAdminUI(user);
        else showLoginScreen();
      });
    }

    // ── Auth ──
    window.doLogin = () => {
      if (!isConfigured) return;
      const email = document.getElementById('l-email').value.trim();
      const pass  = document.getElementById('l-pass').value;
      document.getElementById('login-err').textContent = '';
      auth.signInWithEmailAndPassword(email, pass)
        .catch(e => {
          document.getElementById('login-err').textContent =
            e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password'
              ? 'Wrong email or password.'
              : e.message;
        });
    };
    window.doLogout = () => auth.signOut();

    document.getElementById('l-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.doLogin();
    });

    function showLoginScreen() {
      document.getElementById('login-screen').style.display = '';
      document.getElementById('admin-ui').style.display = 'none';
    }
    function showAdminUI(user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-ui').style.display = '';
      document.getElementById('admin-email').textContent = user.email;
      loadRides(); // loadRegistrations() is called inside loadRides after ridesCache updates
    }

    // ── Tabs ──
    document.querySelectorAll('.admin-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.admin-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('pane-' + btn.dataset.pane).classList.add('active');
      });
    });

    // ── Rides CRUD ──
    let ridesCache = {};

    function loadRides() {
      const spinner = document.getElementById('rides-spinner');
      spinner.style.display = '';
      // scheduledRides path mirrors the mod app schema
      db.ref('scheduledRides').on('value', snap => {
        spinner.style.display = 'none';
        ridesCache = snap.val() || {};
        renderRideList();
        loadRegistrations(); // derive registrations from same snapshot
        updateRegRideFilter();
      });
    }

    function renderRideList() {
      const el = document.getElementById('ride-list');
      const entries = Object.entries(ridesCache);
      if (!entries.length) {
        el.innerHTML = '<p class="no-rides">No upcoming rides. Add one below.</p>';
        return;
      }
      const sorted = entries.sort((a, b) =>
        (a[1].sortOrder || 0) - (b[1].sortOrder || 0) ||
        (a[1].rideDate || '').localeCompare(b[1].rideDate || ''));
      el.innerHTML = sorted.map(([key, r]) =>
        '<div class="ride-row">' +
          '<span class="ride-row-emoji">' + (r.emoji || '🏍️') + '</span>' +
          '<div class="ride-row-info">' +
            '<strong>' + (r.rideName || '') + '</strong>' +
            '<span>📍 ' + (r.meetingPoint || '') +
            (r.destination && r.destination !== r.meetingPoint ? ' → ' + r.destination : '') +
            ' · 📅 ' + (r.rideDate || '') +
            (r.maxRiders ? ' · ' + r.maxRiders + ' max' : '') + '</span>' +
          '</div>' +
          '<span class="status-pill sp-' + (r.status || 'scheduled') + '">' + (r.status || 'scheduled') + '</span>' +
          '<div class="ride-row-actions">' +
            '<button class="icon-btn" onclick="editRide(\'' + key + '\')" aria-label="Edit">✏️</button>' +
            '<button class="icon-btn del" onclick="deleteRide(\'' + key + '\',\'' + (r.rideName || '').replace(/'/g, '') + '\')" aria-label="Delete">🗑️</button>' +
          '</div>' +
        '</div>'
      ).join('');
    }

    window.saveRide = () => {
      const rideName     = document.getElementById('f-title').value.trim();
      const meetingPoint = document.getElementById('f-location').value.trim();
      const destination  = document.getElementById('f-destination').value.trim();
      const rideDate     = document.getElementById('f-date').value.trim();
      if (!rideName || !meetingPoint || !destination || !rideDate) {
        alert('Ride Name, Meeting Point, Destination and Date are required.');
        return;
      }
      const key = document.getElementById('edit-key').value;
      const ride = {
        rideName, meetingPoint, destination, rideDate,
        type:   document.getElementById('f-type').value,
        emoji:  document.getElementById('f-emoji').value.trim() || '🏍️',
        status: document.getElementById('f-status').value,
      };
      const maxRiders = parseInt(document.getElementById('f-spots').value, 10);
      if (maxRiders) ride.maxRiders = maxRiders;
      const distance = parseInt(document.getElementById('f-distance').value, 10);
      if (distance) ride.distance = distance;
      const notes = document.getElementById('f-notes').value.trim();
      if (notes) ride.notes = notes;

      const flash = () => {
        const notice = document.getElementById('save-notice');
        notice.classList.add('show');
        setTimeout(() => notice.classList.remove('show'), 2500);
        cancelEdit();
      };

      if (key) {
        // Update existing ride — use update() to preserve sub-collections (registrations, etc.)
        db.ref('scheduledRides/' + key).update(ride)
          .then(flash)
          .catch(e => alert('Save failed: ' + e.message));
      } else {
        // Create new ride — set rideId to the push key, matching mod app convention
        const newRef = db.ref('scheduledRides').push();
        ride.rideId = newRef.key;
        newRef.set(ride)
          .then(flash)
          .catch(e => alert('Save failed: ' + e.message));
      }
    };

    window.editRide = key => {
      const r = ridesCache[key];
      if (!r) return;
      document.getElementById('edit-key').value         = key;
      document.getElementById('f-title').value          = r.rideName      || '';
      document.getElementById('f-location').value       = r.meetingPoint  || '';
      document.getElementById('f-destination').value    = r.destination   || '';
      document.getElementById('f-distance').value       = r.distance      || '';
      document.getElementById('f-date').value           = r.rideDate      || '';
      document.getElementById('f-spots').value          = r.maxRiders     || '';
      document.getElementById('f-emoji').value          = r.emoji         || '';
      document.getElementById('f-type').value           = r.type          || 'general';
      document.getElementById('f-status').value         = r.status        || 'scheduled';
      document.getElementById('f-notes').value          = r.notes         || '';
      document.getElementById('form-heading').textContent = 'Edit Ride';
      document.getElementById('save-btn').textContent  = 'Save Changes';
      document.getElementById('cancel-btn').style.display = '';
      document.getElementById('form-heading').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    window.deleteRide = (key, title) => {
      if (!confirm('Delete "' + title + '"? This cannot be undone.')) return;
      db.ref('scheduledRides/' + key).remove().catch(e => alert('Delete failed: ' + e.message));
    };

    window.cancelEdit = () => {
      document.getElementById('edit-key').value = '';
      ['f-title','f-location','f-destination','f-distance','f-date','f-spots','f-emoji','f-notes'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('f-type').value   = 'ghats';
      document.getElementById('f-status').value = 'scheduled';
      document.getElementById('form-heading').textContent = 'Add New Ride';
      document.getElementById('save-btn').textContent = 'Add Ride';
      document.getElementById('cancel-btn').style.display = 'none';
    };

    // ── Registrations ──
    let allRegs = [];

    function loadRegistrations() {
      allRegs = [];
      Object.entries(ridesCache).forEach(([rideId, ride]) => {
        const rideName = ride.rideName || rideId;
        Object.entries(ride.registrations || {}).forEach(([key, r]) => {
          allRegs.push({ ...r, _id: rideId + '/' + key, ride: rideName, timestamp: r.registeredAt || 0 });
        });
        Object.entries(ride.waitlist || {}).forEach(([key, r]) => {
          allRegs.push({ ...r, _id: rideId + '/waitlist/' + key, ride: rideName + ' (waitlist)', timestamp: r.joinedAt || 0 });
        });
      });
      allRegs.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      filterRegs();
    }

    function updateRegRideFilter() {
      const sel = document.getElementById('reg-filter-ride');
      const current = sel.value;
      const rides = [...new Set(allRegs.map(r => r.ride).filter(Boolean))];
      sel.innerHTML = '<option value="">All rides</option>' +
        rides.map(r => '<option value="' + r + '"' + (r === current ? ' selected' : '') + '>' + r + '</option>').join('');
    }

    window.filterRegs = () => {
      const rideFilter = document.getElementById('reg-filter-ride').value.toLowerCase();
      const search = document.getElementById('reg-search').value.toLowerCase();
      const filtered = allRegs.filter(r => {
        const rideMatch = !rideFilter || (r.ride || '').toLowerCase() === rideFilter;
        const searchMatch = !search ||
          (r.name || '').toLowerCase().includes(search) ||
          (r.phone || '').toLowerCase().includes(search) ||
          (r.instagram || '').toLowerCase().includes(search);
        return rideMatch && searchMatch;
      });
      document.getElementById('reg-count').textContent = filtered.length + ' / ' + allRegs.length + ' registrations';
      const tbody = document.getElementById('reg-tbody');
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="reg-empty">' +
          (allRegs.length ? 'No matches.' : 'No registrations yet.') + '</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(r => {
        const d = r.timestamp ? new Date(r.timestamp).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '—';
        return '<tr>' +
          '<td><strong>' + (r.name || '—') + '</strong></td>' +
          '<td>' + (r.ride || '—') + '</td>' +
          '<td>' + (r.phone || '—') + '</td>' +
          '<td>' + (r.bike || '—') + '</td>' +
          '<td>' + (r.instagram || '—') + '</td>' +
          '<td style="white-space:nowrap;">' + d + '</td>' +
        '</tr>';
      }).join('');
      updateRegRideFilter();
    };

  })();
  </script>
</body>
</html>
